<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>แผนพรุ่งนี้</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1B2430;
    --bg-deep:#12181F;
    --paper:#F6F1E4;
    --paper-dim:#ECE4CF;
    --ink:#20241F;
    --ink-soft:#5B6472;
    --red:#C0392B;
    --gold:#C89A2C;
    --green:#4C7A5D;
    --line:#D8CFB4;
    --font-display:'Kanit',sans-serif;
    --font-body:'Sarabun',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{
    background:var(--bg-deep);
    font-family:var(--font-body);
    color:var(--paper);
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:640px;
    margin:0 auto;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 0%, #24304096, transparent 45%),
      var(--bg);
    padding-bottom:120px;
  }

  /* ---------- CUTE ROUTE CARD ---------- */
  :root{
    --cute-cream:#FFF6E9;
    --cute-pink:#FF7FA3;
    --cute-mint:#5FC9A8;
    --cute-yellow:#FFC24B;
    --cute-blue:#5FB6E0;
    --cute-ink:#6B4E3D;
  }
  .route-card{
    margin:16px 16px 0;
    background:var(--cute-cream);
    border-radius:22px;
    padding:16px 16px 14px;
    position:relative;
    box-shadow:0 10px 26px -10px #00000070;
    border:2px dashed #F0D9B5;
  }
  .route-tape{
    position:absolute;
    top:-10px;
    width:54px;height:20px;
    background:#FFD9E4cc;
    border:1px solid #ffffff55;
    transform:rotate(-8deg);
  }
  .route-tape-r{right:24px; transform:rotate(7deg); background:#CFF2E4cc;}
  .route-tape-l{left:24px;}
  .route-title{
    font-family:var(--font-display);
    font-weight:600;
    font-size:16px;
    color:var(--cute-ink);
    margin-bottom:10px;
    text-align:center;
  }
  .route-photo-frame{
    background:#fff;
    padding:8px 8px 8px;
    border-radius:14px;
    transform:rotate(-1.2deg);
    box-shadow:0 6px 16px -6px #00000055;
    margin:0 auto 14px;
    max-width:320px;
  }
  .route-photo-frame img{
    width:100%;
    display:block;
    border-radius:8px;
  }
  .route-stepper{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:4px;
    margin-bottom:12px;
  }
  .rs-bubble{
    display:flex;
    align-items:center;
    gap:6px;
    padding:7px 12px;
    border-radius:999px;
    font-family:var(--font-body);
    font-size:12.5px;
    font-weight:600;
    background:#fff;
    color:#B8A88F;
    border:2px solid #F0D9B5;
    white-space:nowrap;
    max-width:150px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .rs-bubble .rs-num{
    width:18px;height:18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:10px;background:#F0D9B5;color:#fff;flex-shrink:0;
  }
  .rs-bubble.current{
    background:var(--cute-pink);
    color:#fff;
    border-color:var(--cute-pink);
    transform:scale(1.06);
    box-shadow:0 4px 12px -3px #FF7FA366;
  }
  .rs-bubble.current .rs-num{background:#fff;color:var(--cute-pink);}
  .rs-bubble.passed{
    background:var(--cute-mint);
    color:#fff;
    border-color:var(--cute-mint);
    opacity:.85;
  }
  .rs-bubble.passed .rs-num{background:#fff;color:var(--cute-mint);}
  .rs-arrow{color:#DDC79E;font-size:12px;}
  .route-nav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .route-nav-btn{
    background:#fff;
    border:2px solid var(--cute-blue);
    color:var(--cute-blue);
    font-family:var(--font-display);
    font-weight:600;
    font-size:12.5px;
    border-radius:999px;
    padding:8px 12px;
    cursor:pointer;
    flex-shrink:0;
  }
  .route-nav-btn:active{transform:scale(.96);}
  .route-nav-btn:disabled{opacity:.35; cursor:default;}
  .route-now{
    font-family:var(--font-body);
    font-size:12.5px;
    color:var(--cute-ink);
    text-align:center;
    flex:1;
  }

  /* ---------- HEADER ---------- */
  .hero{
    padding:28px 20px 18px;
    border-bottom:1px solid #2E3B4C;
  }
  .eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.18em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .hero h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:clamp(24px,6vw,32px);
    margin:0 0 14px;
    line-height:1.15;
  }
  .hero-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:16px;
  }
  .field-inline{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .field-inline label{
    font-size:11px;
    color:#8FA0B5;
    font-family:var(--font-mono);
  }
  .title-input{
    width:100%;
    background:transparent;
    border:none;
    border-bottom:2px dashed #3A4A5E;
    color:var(--paper);
    font-family:var(--font-display);
    font-size:15px;
    padding:6px 2px;
    outline:none;
  }
  .title-input::placeholder{color:#5A6C80;}
  .date-input{
    background:#24303F;
    border:1px solid #3A4A5E;
    color:var(--paper);
    border-radius:8px;
    padding:8px 10px;
    font-family:var(--font-mono);
    font-size:13px;
    outline:none;
  }
  .progress-wrap{display:flex;align-items:center;gap:10px;}
  .progress-bar{
    flex:1;
    height:10px;
    border-radius:6px;
    background:#24303F;
    overflow:hidden;
    border:1px solid #3A4A5E;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--gold),var(--green));
    transition:width .3s ease;
  }
  .progress-label{
    font-family:var(--font-mono);
    font-size:12px;
    color:#B9C6D6;
    white-space:nowrap;
  }
  .all-ready{
    margin-top:14px;
    display:none;
    align-items:center;
    gap:10px;
    color:var(--green);
    font-family:var(--font-display);
    font-weight:600;
    font-size:14px;
  }
  .all-ready.show{display:flex;}
  .all-ready .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px #4c7a5d33;}

  /* ---------- LIST / EMPTY ---------- */
  main{padding:18px 16px 0;}
  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:#7E8FA3;
  }
  .empty-state .stamp-icon{
    width:56px;height:56px;margin:0 auto 16px;
    border:2px dashed #435264;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;
  }
  .empty-state p{font-size:14px;line-height:1.6;max-width:280px;margin:0 auto;}

  /* ---------- STOP CARD (boarding-pass style) ---------- */
  .stop-card{
    background:var(--paper);
    color:var(--ink);
    border-radius:14px;
    margin-bottom:22px;
    position:relative;
    box-shadow:0 8px 24px -8px #00000066;
  }
  .stop-top{
    display:flex;
    gap:14px;
    padding:16px 16px 18px;
  }
  .stop-photo{
    width:84px;height:84px;
    flex-shrink:0;
    border-radius:10px;
    background:var(--paper-dim);
    border:1.5px dashed #B9AD8A;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .stop-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .stop-photo .ph-placeholder{
    font-size:10px;text-align:center;color:#8B7F5E;line-height:1.4;padding:4px;
    font-family:var(--font-mono);
  }
  .stop-info{flex:1;min-width:0;}
  .stop-time{
    font-family:var(--font-mono);
    font-size:12px;
    color:var(--red);
    font-weight:600;
    letter-spacing:.03em;
  }
  .stop-name{
    font-family:var(--font-display);
    font-weight:600;
    font-size:19px;
    margin:2px 0 4px;
    word-break:break-word;
  }
  .stop-address{
    font-size:13px;
    color:var(--ink-soft);
    margin:0 0 8px;
    line-height:1.4;
    word-break:break-word;
  }
  .stop-actions{display:flex;gap:14px;}
  .link-btn{
    background:none;border:none;padding:0;cursor:pointer;
    font-family:var(--font-body);font-size:12px;font-weight:600;
    color:var(--ink-soft);text-decoration:underline;
  }
  .link-btn.danger{color:var(--red);}

  .perforation{
    position:relative;
    margin:0 18px;
    border-top:2px dashed #C9BE9E;
  }
  .perforation::before,.perforation::after{
    content:'';position:absolute;top:-10px;width:20px;height:20px;
    border-radius:50%;background:var(--bg);
  }
  .perforation::before{left:-28px;}
  .perforation::after{right:-28px;}

  .stop-body{padding:18px 16px 16px;}
  .section-label{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:#8B7F5E;
    margin:0 0 10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .section-label + .section-label{margin-top:18px;}

  ul.item-list{list-style:none;margin:0 0 10px;padding:0;display:flex;flex-direction:column;gap:8px;}
  .item-row{
    display:flex;align-items:center;gap:10px;
    background:#fff;border:1px solid #E4DBC2;border-radius:10px;
    padding:8px 10px;
  }
  .chk{
    width:22px;height:22px;flex-shrink:0;
    border-radius:6px;border:2px solid #C9BE9E;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:14px;color:transparent;
    background:#fff;
  }
  .chk.done{background:var(--green);border-color:var(--green);color:#fff;}
  .item-name{flex:1;font-size:14px;min-width:0;word-break:break-word;}
  .item-name.done{color:var(--green);text-decoration:line-through;text-decoration-color:#4C7A5D88;}
  .thumb{
    width:36px;height:36px;border-radius:8px;flex-shrink:0;
    background:var(--paper-dim);border:1.5px dashed #B9AD8A;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;overflow:hidden;font-size:14px;color:#8B7F5E;
    position:relative;
  }
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .row-del{
    background:none;border:none;color:#B9AD8A;cursor:pointer;
    font-size:16px;line-height:1;padding:4px;flex-shrink:0;
  }
  .row-del:hover{color:var(--red);}

  .add-row{display:flex;gap:8px;margin-top:2px;}
  .add-row input{
    flex:1;border:1px solid #D8CFB4;border-radius:9px;
    padding:9px 12px;font-family:var(--font-body);font-size:14px;
    background:#fff;color:var(--ink);outline:none;
  }
  .add-row input:focus{border-color:var(--gold);}
  .add-row button{
    background:var(--ink);color:var(--paper);border:none;border-radius:9px;
    padding:0 16px;font-family:var(--font-display);font-weight:600;
    font-size:14px;cursor:pointer;
  }

  .stamp{
    position:absolute;
    top:14px;right:16px;
    border:2.5px solid var(--red);
    color:var(--red);
    border-radius:50%;
    width:64px;height:64px;
    display:flex;align-items:center;justify-content:center;
    text-align:center;
    font-family:var(--font-display);
    font-weight:700;
    font-size:11px;
    line-height:1.15;
    transform:rotate(-14deg);
    opacity:.85;
    letter-spacing:.02em;
    pointer-events:none;
  }

  /* ---------- NEW STOP FORM ---------- */
  .new-stop-form{
    background:var(--paper);color:var(--ink);
    border-radius:14px;padding:18px 16px;margin-bottom:22px;
    display:none;
    box-shadow:0 8px 24px -8px #00000066;
  }
  .new-stop-form.show{display:block;}
  .new-stop-form h3{
    font-family:var(--font-display);margin:0 0 14px;font-size:17px;
  }
  .form-field{margin-bottom:12px;}
  .form-field label{
    display:block;font-size:11px;font-family:var(--font-mono);
    color:#8B7F5E;margin-bottom:5px;letter-spacing:.05em;
  }
  .form-field input,.form-field textarea{
    width:100%;border:1px solid #D8CFB4;border-radius:9px;
    padding:10px 12px;font-family:var(--font-body);font-size:14px;
    background:#fff;color:var(--ink);outline:none;resize:vertical;
  }
  .form-field input:focus,.form-field textarea:focus{border-color:var(--gold);}
  .form-actions{display:flex;gap:10px;margin-top:14px;}
  .btn-primary{
    flex:1;background:var(--ink);color:var(--paper);border:none;
    border-radius:9px;padding:12px;font-family:var(--font-display);
    font-weight:600;font-size:14px;cursor:pointer;
  }
  .btn-secondary{
    background:transparent;color:var(--ink-soft);border:1px solid #D8CFB4;
    border-radius:9px;padding:12px 16px;font-family:var(--font-body);
    font-size:14px;cursor:pointer;
  }

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;left:50%;bottom:22px;
    transform:translateX(-50%);
    max-width:640px;width:calc(100% - 32px);
    background:var(--red);color:#fff;border:none;
    border-radius:14px;padding:15px;
    font-family:var(--font-display);font-weight:600;font-size:15px;
    cursor:pointer;box-shadow:0 10px 24px -6px #00000080;
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .fab:active{transform:translateX(-50%) scale(.98);}

  .footer-note{
    text-align:center;padding:14px 20px 6px;
    font-size:11px;color:#5A6C80;font-family:var(--font-mono);
  }
  .footer-note button{
    background:none;border:none;color:#7E8FA3;text-decoration:underline;
    cursor:pointer;font-family:var(--font-mono);font-size:11px;
  }

  input[type="file"]{display:none;}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>

<script>
(function(){

  let saveTimer = null;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function tomorrowISO(){
    const d = new Date();
    d.setDate(d.getDate()+1);
    return d.toISOString().slice(0,10);
  }

  function defaultState(){
    return { title:'', dateISO: tomorrowISO(), stops: [], currentStopIndex: 0 };
  }

  function mkDocs(names){
    return names.map(n => ({ id: uid(), name: n, done:false, photo:null }));
  }
  function mkTodos(texts){
    return texts.map(t => ({ id: uid(), text: t, done:false }));
  }

  function seedStops(){
    return [
      {

  async function loadState(){
    for(let attempt=0; attempt<3; attempt++){
      try{
        const res = await window.storage.get(STORAGE_KEY, true);
        if(res && res.value) return JSON.parse(res.value);
        return defaultState();
      }catch(e){
        if(attempt < 2) await new Promise(r=>setTimeout(r, 800));
      }
    }
    return defaultState();
  }

  function showSaveStatus(text, isError){
    let badge = document.getElementById('saveStatusBadge');
    if(!badge){
      badge = document.createElement('div');
      badge.id = 'saveStatusBadge';
      badge.style.cssText = 'position:fixed;left:50%;bottom:18px;transform:translateX(-50%);'
        + 'z-index:9999;padding:8px 16px;border-radius:999px;font-family:sans-serif;'
        + 'font-size:12.5px;font-weight:600;box-shadow:0 6px 16px -6px #00000070;'
        + 'transition:opacity .3s ease;pointer-events:none;';
      document.body.appendChild(badge);
    }
    badge.textContent = text;
    badge.style.background = isError ? '#C0392B' : '#4C7A5D';
    badge.style.color = '#fff';
    badge.style.opacity = '1';
    clearTimeout(badge._hideTimer);
    badge._hideTimer = setTimeout(()=>{ badge.style.opacity = '0'; }, isError ? 4000 : 1500);
  }

  async function saveWithRetry(payload, attemptsLeft){
    try{
      await window.storage.set(STORAGE_KEY, payload, true);
    }catch(e){
      if(attemptsLeft > 0){
        await new Promise(r=>setTimeout(r, 1000));
        return saveWithRetry(payload, attemptsLeft - 1);
      }
      throw e;
    }
  }

  function queueSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{
      const payload = JSON.stringify(state);
      try{
        await saveWithRetry(payload, 2);
      } catch(e){
        // server-side issue after retries — don't blast a console error banner,
        // just let the person know quietly so they can try again in a moment
        showSaveStatus('บันทึกไม่สำเร็จ เดี๋ยวลองใหม่อีกครั้งนะ', true);
        setTimeout(queueSave, 3000);
      }
    }, 250);
  }

  function compressImage(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const maxDim = 640;
          const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(img.width * scale);
          canvas.height = Math.round(img.height * scale);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.6));
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- mutations ----------
  function findStop(id){ return state.stops.find(s=>s.id===id); }
  function findDoc(stop, id){ return stop.docs.find(d=>d.id===id); }
  function findTodo(stop, id){ return stop.todos.find(t=>t.id===id); }

  function addStop(name, time, address){
    state.stops.push({ id: uid(), name, time, address, photo: null, docs: [], todos: [] });
    queueSave(); render();
  }
  function deleteStop(id){
    state.stops = state.stops.filter(s=>s.id!==id);
    queueSave(); render();
  }
  function setStopPhoto(id, dataURL){
    findStop(id).photo = dataURL; queueSave(); render();
  }
  function addDoc(stopId, name){
    if(!name.trim()) return;
    findStop(stopId).docs.push({ id: uid(), name: name.trim(), done:false, photo:null });
    queueSave(); render();
  }
  function toggleDoc(stopId, docId){
    const d = findDoc(findStop(stopId), docId); d.done = !d.done; queueSave(); render();
  }
  function setDocPhoto(stopId, docId, dataURL){
    const d = findDoc(findStop(stopId), docId); d.photo = dataURL; d.done = true; queueSave(); render();
  }
  function deleteDoc(stopId, docId){
    const s = findStop(stopId); s.docs = s.docs.filter(d=>d.id!==docId); queueSave(); render();
  }
  function addTodo(stopId, text){
    if(!text.trim()) return;
    findStop(stopId).todos.push({ id: uid(), text: text.trim(), done:false });
    queueSave(); render();
  }
  function toggleTodo(stopId, todoId){
    const t = findTodo(findStop(stopId), todoId); t.done = !t.done; queueSave(); render();
  }
  function deleteTodo(stopId, todoId){
    const s = findStop(stopId); s.todos = s.todos.filter(t=>t.id!==todoId); queueSave(); render();
  }

  // ---------- rendering ----------
  function fmtTime(t){ return t ? t : '--:--'; }

  function createItemRow(opts){
    // opts: {name, done, onToggle, onDelete, thumb:{photo,onUpload}}
    const row = document.createElement('div');
    row.className = 'item-row';

    const chk = document.createElement('div');
    chk.className = 'chk' + (opts.done ? ' done' : '');
    chk.textContent = opts.done ? '✓' : '';
    chk.addEventListener('click', opts.onToggle);
    row.appendChild(chk);

    const nameEl = document.createElement('div');
    nameEl.className = 'item-name' + (opts.done ? ' done' : '');
    nameEl.textContent = opts.name;
    row.appendChild(nameEl);

    if(opts.thumb){
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      if(opts.thumb.photo){
        const img = document.createElement('img');
        img.src = opts.thumb.photo;
        thumb.appendChild(img);
      } else {
        thumb.textContent = '📷';
      }
      const fileInput = document.createElement('input');
      fileInput.type = 'file';
      fileInput.accept = 'image/*';
      fileInput.capture = 'environment';
      fileInput.addEventListener('change', async (e)=>{
        const file = e.target.files[0];
        if(!file) return;
        const dataURL = await compressImage(file);
        opts.thumb.onUpload(dataURL);
      });
      thumb.appendChild(fileInput);
      thumb.addEventListener('click', ()=> fileInput.click());
      row.appendChild(thumb);
    }

    const del = document.createElement('button');
    del.className = 'row-del';
    del.textContent = '✕';
    del.addEventListener('click', opts.onDelete);
    row.appendChild(del);

    return row;
  }

  function createAddRow(placeholder, onAdd){
    const wrap = document.createElement('div');
    wrap.className = 'add-row';
    const input = document.createElement('input');
    input.placeholder = placeholder;
    const btn = document.createElement('button');
    btn.textContent = '+';
    function submit(){
      if(input.value.trim()){ onAdd(input.value); input.value=''; }
    }
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); submit(); } });
    wrap.appendChild(input); wrap.appendChild(btn);
    return wrap;
  }

    info.appendChild(nameEl);
    if(stop.address){
      const addrEl = document.createElement('p');

    const actions = document.createElement('div');

    const docList = document.createElement('div');
    docList.className = 'item-list';
    stop.docs.forEach(doc=>{
      docList.appendChild(createItemRow({
        name: doc.name,
        done: doc.done,
        onToggle: ()=> toggleDoc(stop.id, doc.id),
        onDelete: ()=> deleteDoc(stop.id, doc.id),

      }));

      }));

    body.appendChild(todoList);
    body.appendChild(createAddRow('เพิ่มขั้นตอน เช่น กดบัตรคิว, ถ่ายเอกสารเผื่อไว้', (val)=> addTodo(stop.id, val)));

  function doneCount(arr){ return arr.filter(x=>x.done).length; }

  function render(){
    document.getElementById('titleInput').value = state.title || '';
    document.getElementById('dateInput').value = state.dateISO || tomorrowISO();

    const list = document.getElementById('stopsList');
    list.innerHTML = '';

    if(state.stops.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<div class="stamp-icon">📋</div><p>ยังไม่มีสถานที่ในแผนพรุ่งนี้ กดปุ่มด้านล่างเพื่อเพิ่มสถานที่แรก พร้อมเอกสารที่ต้องเตรียม</p>';
      list.appendChild(empty);
    } else {
      state.stops.forEach(stop => list.appendChild(createStopCard(stop)));
    }

    // overall progress
    let total = 0, done = 0;
    state.stops.forEach(s=>{
      total += s.docs.length + s.todos.length;
      done += doneCount(s.docs) + doneCount(s.todos);
    });
    const pct = total > 0 ? Math.round((done/total)*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = done + '/' + total + ' พร้อม';
    document.getElementById('allReady').classList.toggle('show', total > 0 && done === total);

    renderStepper();
  }

  function renderStepper(){
    const stepper = document.getElementById('routeStepper');
    const nowLabel = document.getElementById('routeNow');
    const prevBtn = document.getElementById('routePrev');
    const nextBtn = document.getElementById('routeNext');
    stepper.innerHTML = '';

    if(!state.stops || state.stops.length === 0){
      nowLabel.textContent = 'เพิ่มสถานที่ก่อนน้า แล้วเดี๋ยวบอกให้ว่าถึงไหนแล้ว 🐣';
      prevBtn.disabled = true; nextBtn.disabled = true;
      return;
    }

    if(state.currentStopIndex == null) state.currentStopIndex = 0;
    if(state.currentStopIndex > state.stops.length - 1) state.currentStopIndex = state.stops.length - 1;
    if(state.currentStopIndex < 0) state.currentStopIndex = 0;

    state.stops.forEach((stop, i) => {
      if(i > 0){
        const arrow = document.createElement('span');
        arrow.className = 'rs-arrow';
        arrow.textContent = '→';
        stepper.appendChild(arrow);
      }
      const bubble = document.createElement('div');
      bubble.className = 'rs-bubble' + (i === state.currentStopIndex ? ' current' : (i < state.currentStopIndex ? ' passed' : ''));
      const num = document.createElement('span');
      num.className = 'rs-num';
      num.textContent = (i < state.currentStopIndex) ? '✓' : (i+1);
      bubble.appendChild(num);
      const label = document.createElement('span');
      label.textContent = stop.name || 'ไม่มีชื่อ';
      bubble.appendChild(label);
      bubble.addEventListener('click', ()=>{ state.currentStopIndex = i; queueSave(); render(); });
      stepper.appendChild(bubble);
    });

    const cur = state.stops[state.currentStopIndex];
    const cuteBits = ['🐢','🚗','📍','✨','🎈'];
    const emoji = cuteBits[state.currentStopIndex % cuteBits.length];
    nowLabel.innerHTML = 'ตอนนี้ไปที่ <b>' + (cur.name || '') + '</b> ' + emoji;

    prevBtn.disabled = state.currentStopIndex === 0;
    nextBtn.disabled = state.currentStopIndex === state.stops.length - 1;
  }

  document.getElementById('routePrev').addEventListener('click', ()=>{
    if(state.currentStopIndex > 0){ state.currentStopIndex--; queueSave(); render(); }
  });
  document.getElementById('routeNext').addEventListener('click', ()=>{
    if(state.currentStopIndex < state.stops.length - 1){ state.currentStopIndex++; queueSave(); render(); }
  });

  });
  document.getElementById('nsCancel').addEventListener('click', ()=>{
    form.classList.remove('show');
    document.getElementById('nsName').value = '';
    document.getElementById('nsTime').value = '';
    document.getElementById('nsAddress').value = '';
  });
  document.getElementById('nsSave').addEventListener('click', ()=>{
    const name = document.getElementById('nsName').value.trim();
    if(!name){ document.getElementById('nsName').focus(); return; }
    const time = document.getElementById('nsTime').value;
    const address = document.getElementById('nsAddress').value.trim();
    addStop(name, time, address);
    document.getElementById('nsName').value = '';
    document.getElementById('nsTime').value = '';
    document.getElementById('nsAddress').value = '';
    form.classList.remove('show');
  });

  document.getElementById('resetAll').addEventListener('click', async ()=>{
    if(!confirm('ล้างข้อมูลแผนทั้งหมดใช่หรือไม่? ทำแล้วกู้คืนไม่ได้')) return;
    state = defaultState();
    queueSave(); render();
  });

  // ---------- init ----------
  (async function init(){
    state = await loadState();
    if(!state.stops || state.stops.length === 0){
      state.stops = seedStops();
      if(!state.title) state.title = 'รับเอกสารลูกค้า → แจ้งย้ายสรรพากร → ขึ้นทะเบียนประกันสังคม';
      queueSave();
    } else if(state.stops[0] && state.stops[0].docs.length === 0 && state.stops.length >= 3){
      // migration: backfill the combined checklist for people who already had the earlier version
      state.stops[0].docs = seedStops()[0].docs;
      queueSave();
    }
    render();

    // ---------- polling: pick up changes from other people using the shared plan ----------
    setInterval(async ()=>{
      // don't interrupt someone while they're actively typing
      const activeTag = document.activeElement && document.activeElement.tagName;
      if(activeTag === 'INPUT' || activeTag === 'TEXTAREA') return;
      try{
        const fresh = await loadState();
        if(JSON.stringify(fresh) !== JSON.stringify(state)){
          state = fresh;
          render();
        }
      }catch(e){ /* ignore, keep showing current state */ }
    }, 4000);
  })();
})();
